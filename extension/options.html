<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Local LLM Bridge — Settings</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --text: #e6e6e6;
    --muted: #8a90a0;
    --accent: #6aa6ff;
    --border: #262a35;
    --ok: #4ade80;
    --bad: #ff6b6b;
  }
  * { box-sizing: border-box; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 32px;
    display: flex;
    justify-content: center;
  }
  .card {
    width: 100%;
    max-width: 520px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 24px;
  }
  h1 { font-size: 18px; margin: 0 0 4px; }
  p.sub { margin: 0 0 20px; font-size: 13px; color: var(--muted); }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  input[type="text"] {
    width: 100%;
    font: inherit;
    color: var(--text);
    background: #0d1017;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    outline: none;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .actions { display: flex; gap: 8px; margin-top: 18px; }
  button {
    font: inherit;
    border-radius: 8px;
    padding: 9px 14px;
    border: 1px solid var(--border);
    background: #0d1017;
    color: var(--text);
    cursor: pointer;
  }
  button.primary { background: var(--accent); border-color: var(--accent); color: #0b1220; font-weight: 600; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .status { margin-top: 16px; font-size: 13px; min-height: 18px; display: flex; align-items: center; gap: 8px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #555; flex: none; }
  .dot.ok { background: var(--ok); }
  .dot.bad { background: var(--bad); }
  .dot.pending { background: #c5a76a; }
  .status.ok { color: var(--ok); }
  .status.bad { color: var(--bad); }
</style>
</head>
<body>
  <div class="card">
    <h1>Local LLM Bridge</h1>
    <p class="sub">Point the bridge at your Ollama server.</p>

    <label for="url">Ollama server URL</label>
    <input id="url" type="text" spellcheck="false" autocomplete="off"
           placeholder="http://192.168.1.50:11434" />
    <div class="hint">Include the scheme and port, e.g. <code>http://192.168.1.50:11434</code>. Default: <code>http://localhost:11434</code></div>

    <div class="actions">
      <button id="save" class="primary" type="button">Save</button>
      <button id="test" type="button">Test connection</button>
      <button id="reset" type="button">Reset to default</button>
    </div>

    <div id="status" class="status"><span id="dot" class="dot"></span><span id="statusText"></span></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
