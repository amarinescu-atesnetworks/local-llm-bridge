server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Don't cache the entry point so page updates land on next refresh
    location = /index.html { add_header Cache-Control "no-store"; }
    location = /           { add_header Cache-Control "no-store"; try_files /index.html =404; }

    # Modest cache for static assets (future-proof — nothing fingerprinted yet)
    location ~* \.(js|css|png|svg|woff2)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
